<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Cleanliness Feedback</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('bmtc.jpg') no-repeat center/cover;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 15px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
    }

    input, select {
      background: rgba(255,255,255,0.8);
    }

    button {
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .stars {
      text-align: center;
      margin-top: 12px;
    }

    .stars span {
      font-size: 22px;
      cursor: pointer;
      color: #ccc;
    }

    .stars span.active {
      color: gold;
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚌 Bus Cleanliness Feedback</h1>

    <input type="text" placeholder="Bus Number">

    <div class="stars" id="stars">
      <span>★</span>
      <span>★</span>
      <span>★</span>
      <span>★</span>
      <span>★</span>
    </div>

    <select>
      <option>Select Issue</option>
      <option>Clean</option>
      <option>Dirty</option>
      <option>Very Dirty</option>
    </select>

    <button>Submit</button>
  </div>

  <script>
    const stars = document.querySelectorAll("#stars span");

    stars.forEach((star, index) => {
      star.addEventListener("click", () => {
        stars.forEach((s, i) => {
          s.classList.toggle("active", i <= index);
        });
      });
    });
  </script>

</body>
</html>
